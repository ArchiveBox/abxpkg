name: Run Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event_name == 'workflow_dispatch' && github.run_id || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  precheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.10.6"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Setup venv and install pip dependencies
      run: |
        uv venv --python "3.12" \
        && uv sync --all-extras --all-groups --no-cache

    - name: Run pre-commit checks
      run: uv run prek run --all-files

    - name: Run documentation code blocks
      run: uv run pytest -vv --tb=long -m "not live_required" README.md django_example_project/README.md AGENTS.md skills docs

  live-documentation:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.10.6"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Setup venv and install pip dependencies
      run: |
        uv venv --python "3.12"
        uv sync --all-extras --all-groups --no-cache

    - name: Run live documentation code blocks
      run: uv run pytest -vv --tb=long -m live_required README.md django_example_project/README.md AGENTS.md skills docs

  discover-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    outputs:
      tests: ${{ steps.set-matrix.outputs.tests }}

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.10.6"
        enable-cache: false

    - name: Discover test files
      id: set-matrix
      run: uv run --no-project python .github/ci_test_matrix.py >> "$GITHUB_OUTPUT"

  tests:
    name: ${{ matrix.test.os_name }} py${{ matrix.test.python_version }} ${{ matrix.test.name }}
    needs: discover-tests
    runs-on: ${{ matrix.test.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        test: ${{ fromJson(needs.discover-tests.outputs.tests) }}

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.test.python_version }}
   
    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.10.6"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Setup venv and install pip dependencies
      run: |
        uv venv --python "${{ matrix.test.python_version }}"
        uv sync --all-extras

    - name: Run discovered test file
      run: uv run pytest -vv --tb=long "${{ matrix.test.path }}"

  package:
    needs:
      - precheck
      - live-documentation
      - tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6

    - name: Setup Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        version: "0.10.6"
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Build and validate distributions
      run: |
        uv build --out-dir dist
        uv publish --dry-run --trusted-publishing never dist/*.whl dist/*.tar.gz
        uv run --no-project python - <<'PY' > dist/SHA256SUMS
        from hashlib import sha256
        from pathlib import Path

        dist = Path("dist")
        artifacts = sorted((*dist.glob("*.whl"), *dist.glob("*.tar.gz")))
        if len(list(dist.glob("*.whl"))) != 1 or len(list(dist.glob("*.tar.gz"))) != 1:
            raise SystemExit(f"Expected one wheel and one sdist, found: {artifacts}")
        for artifact in artifacts:
            print(f"{sha256(artifact.read_bytes()).hexdigest()}  {artifact.name}")
        PY

    - name: Upload tested distributions
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: abxpkg-dist-${{ github.sha }}
        path: |
          dist/*.whl
          dist/*.tar.gz
          dist/SHA256SUMS
        if-no-files-found: error
        retention-days: 90
